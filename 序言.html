<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>序言 - 疗愈33章</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #1a4d3e;
      --primary-light: #2d6a54;
      --bg: #f5f3f0;
      --card-bg: #ffffff;
      --text: #1f1f1f;
      --text-secondary: #5a5a5a;
      --text-muted: #9a9a9a;
      --border: #e8e4df;
      --accent: #d4a373;
    }
    body {
      font-family: "Noto Serif SC", "Songti SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.8;
      -webkit-font-smoothing: antialiased;
    }
    header {
      padding: 48px 24px 32px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: var(--card-bg);
    }
    .logo {
      font-size: 22px;
      font-weight: 650;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 4px;
    }
    .logo-dot { color: var(--accent); }
    .back {
      display: inline-block;
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
      margin-bottom: 24px;
    }
    .back:hover { text-decoration: underline; }
    main {
      max-width: 620px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }
    .tag {
      display: inline-block;
      font-size: 10px;
      color: var(--primary);
      background: rgba(26, 77, 62, 0.08);
      padding: 3px 10px;
      border-radius: 4px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 24px;
      font-weight: 650;
      color: var(--text);
      margin-bottom: 8px;
    }
    .section {
      margin-top: 28px;
      padding-top: 28px;
      border-top: 1px solid var(--border);
    }
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 12px;
    }
    .content {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.9;
    }
    .content p { margin-bottom: 12px; }
    .content ul { margin: 12px 0; padding-left: 20px; }
    .content li { margin-bottom: 8px; }
    .related {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .related-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
    }
    .related-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .related-item {
      font-size: 12px;
      color: var(--primary);
      background: var(--card-bg);
      padding: 8px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      text-decoration: none;
    }
    .related-item:hover {
      border-color: var(--primary-light);
      background: rgba(26, 77, 62, 0.05);
    }
    footer {
      max-width: 620px;
      margin: 0 auto;
      padding: 24px;
      text-align: center;
      border-top: 1px solid var(--border);
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">疗愈<span class="logo-dot">33</span>章</a>

        <h2 style="font-size:15px;font-weight:600;color:var(--text);margin:20px 0 12px;">适用人群</h2>
        <ul>
          <li>企业管理者 / 专业技术人员 / 创意工作者</li>
          <li>高节奏、高要求工作环境从业者</li>
          <li>经常感到疲惫、情绪耗竭者</li>
          <li>因工作压力失眠者</li>

    <div class="related">

      <div class="related-list">
        <a href="分类框架.html" class="related-item">分类框架</a>

        <a href="职场高效疗愈工具箱.html" class="related-item">职场高效疗愈工具箱</a>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-links">
      <a href="index.html">首页</a>
    </div>
  </footer>
</body>
</html>
