<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分类框架 - 疗愈33章</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #1a4d3e;
      --bg: #f5f3f0;
      --card-bg: #ffffff;
      --text: #333;
      --text-secondary: #666;
      --border: #e0ddd8;
      --accent: #d4a373;
    }
    body {
      font-family: "Noto Serif SC", "Songti SC", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }
    header {
      padding: 40px 24px 32px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: var(--card-bg);
    }
    .logo {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 3px;
    }
    .logo-dot { color: var(--accent); }
    .back {
      display: inline-block;
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
      margin-bottom: 20px;
    }
    main {
      max-width: 560px;
      margin: 0 auto;
      padding: 28px 24px 40px;
    }
    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 6px;
    }
    .desc {
      font-size: 14px;
      color: var(--text-secondary);
      margin-bottom: 24px;
    }
    .type-item {
      background: var(--card-bg);
      padding: 16px 18px;
      border-radius: 10px;
      border: 1px solid var(--border);
      margin-bottom: 10px;
    }
    .type-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .type-desc {
      font-size: 13px;
      color: var(--text-secondary);
    }
    .section {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
    }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 12px;
    }
    .point-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .point-item {
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--card-bg);
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .related {
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .related-title {
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }
    .related-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .related-item {
      font-size: 12px;
      color: var(--primary);
      text-decoration: none;
    }
    .related-item:hover {
      text-decoration: underline;
    }
    footer {
      max-width: 560px;
      margin: 0 auto;
      padding: 20px;
      text-align: center;
      border-top: 1px solid var(--border);
    }
    footer a {
      font-size: 12px;
      color: var(--text-secondary);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">疗愈<span class="logo-dot">33</span>章</a>
  </header>

  <main>
    <a href="index.html" class="back">← 返回</a>

    <h1>分类框架</h1>
    <p class="desc">明确压力类型，选择对症方案</p>

    <div class="type-item">
      <div class="type-name">情绪校准</div>
      <div class="type-desc">会议后烦躁、被批评沮丧、deadline前焦虑</div>
    </div>

    <div class="type-item">
      <div class="type-name">认知重塑</div>
      <div class="type-desc">思维反刍、职业倦怠、"我必须完美"信念</div>
    </div>

    <div class="type-item">
      <div class="type-name">身心连接</div>
      <div class="type-desc">肩颈酸痛、头痛、肠胃不适</div>
    </div>

    <div class="type-item">
      <div class="type-name">关系调适</div>
      <div class="type-desc">难缠客户、挑剔上司、竞争同事</div>
    </div>

    <div class="section">
      <div class="section-title">核心要点</div>
      <div class="point-list">
        <span class="point-item">情绪→身体调节</span>
        <span class="point-item">认知→心理认知</span>
        <span class="point-item">身心→情境类</span>
        <span class="point-item">表达→创造性</span>
      </div>
    </div>

    <div class="related">
      <div class="related-title">相关推荐</div>
      <div class="related-list">
        <a href="序言.html" class="related-item">序言</a>
        <a href="核心适用场景.html" class="related-item">核心适用场景</a>
        <a href="职场高效疗愈工具箱.html" class="related-item">职场工具箱</a>
      </div>
    </div>
  </main>

  <footer>
    <a href="index.html">← 返回首页</a>
  </footer>
</body>
</html>
