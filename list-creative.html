<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>创造性表达类 - 疗愈33章</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #1a4d3e;
      --primary-light: #2d6a54;
      --bg: #f5f3f0;
      --card-bg: #ffffff;
      --text: #1f1f1f;
      --text-secondary: #5a5a5a;
      --text-muted: #9a9a9a;
      --border: #e8e4df;
      --accent: #d4a373;
    }
    body {
      font-family: "Noto Serif SC", "Songti SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }
    header {
      padding: 48px 24px 32px;
      text-align: center;
      border-bottom: 1px solid var(--border);
      background: var(--card-bg);
    }
    .logo {
      font-size: 22px;
      font-weight: 650;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 4px;
    }
    .logo-dot { color: var(--accent); }
    .back {
      display: inline-block;
      font-size: 13px;
      color: var(--primary);
      text-decoration: none;
      margin-bottom: 24px;
    }
    .back:hover { text-decoration: underline; }
    main {
      max-width: 620px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }
    .tag {
      display: inline-block;
      font-size: 10px;
      color: var(--primary);
      background: rgba(26, 77, 62, 0.08);
      padding: 3px 10px;
      border-radius: 4px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 24px;
      font-weight: 650;
      color: var(--text);
      margin-bottom: 24px;
    }
    .card {
      background: var(--card-bg);
      padding: 20px 22px;
      border-radius: 12px;
      border: 1px solid var(--border);
      text-decoration: none;
      display: block;
      margin-bottom: 12px;
      transition: all 0.25s ease;
    }
    .card:hover {
      border-color: var(--primary-light);
      transform: translateY(-1px);
    }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    footer {
      max-width: 620px;
      margin: 0 auto;
      padding: 24px;
      text-align: center;
      border-top: 1px solid var(--border);
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
    }
    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 12px;
    }
    .footer-links a:hover { color: var(--primary); }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">疗愈<span class="logo-dot">33</span>章</a>
  </header>

  <main>
    <a href="index.html" class="back">← 返回首页</a>

    <span class="tag">创造性表达类</span>
    <h1>创造性表达类</h1>

    <a href="艺术疗愈.html" class="card">
      <div class="card-title">艺术疗愈</div>
      <div class="card-desc">涂鸦/黏土/拼贴，用非语言方式释放潜意识压抑的情绪。</div>
    </a>

    <a href="音乐疗愈.html" class="card">
      <div class="card-title">音乐疗愈</div>
      <div class="card-desc">主动歌唱或喊出歌词，哪怕跑调，重点是释放内心的闷。</div>
    </a>

    <a href="舞蹈舞动疗愈.html" class="card">
      <div class="card-title">舞蹈/舞动疗愈</div>
      <div class="card-desc">关上门随意甩手跺脚，释放肌肉中积压的身体记忆。</div>
    </a>

    <a href="戏剧疗愈.html" class="card">
      <div class="card-title">戏剧疗愈</div>
      <div class="card-desc">角色扮演与即兴表演，在模拟中练习沟通，降低社交焦虑。</div>
    </a>

    <a href="诗歌疗愈.html" class="card">
      <div class="card-title">诗歌疗愈</div>
      <div class="card-desc">自由诗创作与朗诵，梳理混乱情绪，提升自我反思能力。</div>
    </a>

    <a href="绘画疗愈.html" class="card">
      <div class="card-title">绘画疗愈</div>
      <div class="card-desc">曼陀罗填色或自由画，绕过语言防御投射内在情绪。</div>
    </a>

    <a href="色彩疗愈.html" class="card">
      <div class="card-title">色彩疗愈</div>
      <div class="card-desc">用暖色提神、冷色助眠，通过视觉刺激调节多巴胺与心率。</div>
    </a>

    <a href="影视疗愈.html" class="card">
      <div class="card-title">影视疗愈</div>
      <div class="card-desc">观看治愈系影片获得情感共鸣，促进血清素分泌，疏导情绪。</div>
    </a>
  </main>

  <footer>
    <div class="footer-links">
      <a href="index.html">首页</a>
      <a href="序言与分类框架.html">分类框架</a>
    </div>
  </footer>
</body>
</html>
