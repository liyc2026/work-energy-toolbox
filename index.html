  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #1a4d3e;
      --primary-light: #2d6a54;
      --bg: #f5f3f0;
      --card-bg: #ffffff;
      --text: #1f1f1f;
      --text-secondary: #5a5a5a;
      --text-muted: #9a9a9a;
      --border: #e8e4df;
      --accent: #d4a373;
    }
    body {
      font-family: "Noto Serif SC", "Songti SC", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.75;
      -webkit-font-smoothing: antialiased;
    }
    header {
      padding: 64px 24px 48px;
      text-align: center;
    }
    .logo {
      font-size: 28px;
      font-weight: 650;
      color: var(--text);
      text-decoration: none;
      letter-spacing: 4px;
    }
    .logo-special {
      color: var(--accent);
      font-family: "Kaiti SC", "STKaiti", "KaiTi", serif;
      font-weight: 400;
    }
    .subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    main {
      max-width: 620px;
      margin: 0 auto;
      padding: 0 24px 56px;
    }
    .section { margin-bottom: 36px; }
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding-left: 4px;
    }
    .section-icon { font-size: 15px; }
    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      letter-spacing: 1px;
    }
    .section-more {
      margin-left: auto;
      font-size: 12px;
      color: var(--primary);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .section-more:hover { opacity: 1; }
    .card {
      background: var(--card-bg);
      padding: 22px 24px;
      border-radius: 14px;
      border: 1px solid var(--border);
      text-decoration: none;
      display: block;
      transition: all 0.25s ease;
    }
    .card:hover {
      border-color: var(--primary-light);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(26, 77, 62, 0.08);
    }
    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .card-desc {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .card-tag {
      display: inline-block;
      font-size: 10px;
      color: var(--primary);
      background: rgba(26, 77, 62, 0.08);
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    footer {
      max-width: 620px;
      margin: 0 auto;
      padding: 32px 24px;
      text-align: center;
      border-top: 1px solid var(--border);
    }
    .footer-links {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 12px;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--primary); }
    @media (max-width: 600px) {
      header { padding: 48px 20px 36px; }
      main { padding: 0 20px 40px; }
    }
  </style>
